<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Communicating CKD Progression to Patients · L&D Demo Course</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet" />

<style>
  /* ---------- Tokens ---------- */
  :root {
    --teal-50:  #effaf8;
    --teal-100: #d4f1ec;
    --teal-200: #a6e2da;
    --teal-300: #6bccc1;
    --teal-500: #0d9488;
    --teal-600: #0b756d;
    --teal-700: #075953;
    --teal-900: #053f3a;

    --ink:      #0d0f12;
    --ink-soft: #2a2e34;
    --slate-700:#3f444c;
    --slate-500:#6b7280;
    --slate-400:#9aa1ab;
    --slate-300:#cdd2da;
    --slate-200:#e5e8ec;
    --slate-100:#eef0f3;
    --slate-50: #f6f7f9;
    --bone:     #fafaf7;
    --paper:    #ffffff;

    --warn:     #b54708;
    --warn-bg:  #fef3e6;
    --good:     #086354;
    --good-bg:  #e8f6f2;
    --bad:      #9b2c2c;
    --bad-bg:   #fbecec;

    --shadow-sm:  0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 1px rgba(15, 23, 42, 0.03);
    --shadow-md:  0 6px 24px -8px rgba(15, 23, 42, 0.10), 0 2px 6px rgba(15, 23, 42, 0.04);
    --shadow-lg:  0 24px 60px -20px rgba(15, 23, 42, 0.18), 0 8px 24px -8px rgba(15, 23, 42, 0.06);

    --radius-sm:  6px;
    --radius-md:  10px;
    --radius-lg:  16px;
    --radius-xl:  22px;

    --font-sans:  'IBM Plex Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
    --font-serif: 'Source Serif 4', Georgia, 'Iowan Old Style', serif;
  }

  /* ---------- Reset ---------- */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-sans);
    color: var(--ink);
    background: var(--bone);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    overflow: hidden; /* the stage scrolls, not the body */
  }
  button { font-family: inherit; cursor: pointer; }
  button:focus-visible {
    outline: 2px solid var(--teal-500);
    outline-offset: 2px;
  }
  ::selection { background: var(--teal-200); color: var(--teal-900); }

  /* ---------- Root layout ---------- */
  #app { height: 100vh; }
  .course-root {
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    background: var(--bone);
  }

  /* ---------- Top bar / progress ---------- */
  .topbar {
    background: var(--paper);
    border-bottom: 1px solid var(--slate-200);
    padding: 14px 32px 0;
    z-index: 10;
  }
  .topbar-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    padding-bottom: 12px;
  }
  .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .brand-mark {
    width: 36px; height: 36px;
    border-radius: 9px;
    display: grid; place-items: center;
    background: var(--ink);
    color: var(--teal-300);
  }
  .brand-text { min-width: 0; }
  .brand-title {
    font-family: var(--font-serif);
    font-weight: 600;
    font-size: 15px;
    line-height: 1.25;
    color: var(--ink);
    letter-spacing: -0.005em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 44ch;
  }
  .brand-sub {
    font-size: 12px;
    color: var(--slate-500);
    margin-top: 3px;
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .topbar-meta {
    display: flex;
    align-items: center;
    gap: 18px;
    font-size: 12px;
    color: var(--slate-500);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
  }
  .topbar-meta-screen {
    color: var(--ink);
    font-weight: 600;
  }
  .topbar-meta-progress {
    color: var(--teal-600);
    font-weight: 600;
  }

  /* progress track sits at the bottom of the topbar */
  .progress-track {
    position: relative;
    height: 4px;
    background: var(--slate-100);
    border-radius: 999px;
    margin-top: 0;
    margin-bottom: 16px;
  }
  .progress-fill {
    position: absolute; inset: 0 auto 0 0;
    background: var(--teal-500);
    border-radius: 999px;
    transition: width 600ms cubic-bezier(.4, 0, .2, 1);
  }
  .progress-ticks {
    position: absolute; inset: 0;
  }
  .progress-tick {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 26px; height: 26px;
    background: var(--paper);
    border: 2px solid var(--slate-200);
    color: var(--slate-400);
    border-radius: 50%;
    font-family: var(--font-sans);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    display: grid; place-items: center;
    padding: 0;
    transition: all 200ms ease;
  }
  .progress-tick.is-unlocked {
    border-color: var(--teal-500);
    color: var(--teal-600);
    cursor: pointer;
  }
  .progress-tick.is-current {
    background: var(--teal-500);
    color: var(--paper);
    border-color: var(--teal-500);
    transform: translate(-50%, -50%) scale(1.1);
    box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.18);
  }
  .progress-tick:disabled { cursor: not-allowed; }

  /* ---------- Stage / screen transitions ---------- */
  .stage {
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-gutter: stable;
  }
  .stage-inner {
    min-height: 100%;
    animation: slide-in 520ms cubic-bezier(.16, 1, .3, 1) both;
  }
  .stage-dir-fwd { animation-name: slide-in-fwd; }
  .stage-dir-back { animation-name: slide-in-back; }
  @keyframes slide-in-fwd {
    from { opacity: 0; transform: translate3d(28px, 0, 0); }
    to   { opacity: 1; transform: translate3d(0, 0, 0); }
  }
  @keyframes slide-in-back {
    from { opacity: 0; transform: translate3d(-28px, 0, 0); }
    to   { opacity: 1; transform: translate3d(0, 0, 0); }
  }

  /* ---------- Screen layout ---------- */
  .screen {
    max-width: 1280px;
    margin: 0 auto;
    padding: 40px 48px 24px;
  }
  .screen-grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 56px;
    align-items: start;
  }
  .screen-side { position: sticky; top: 24px; }
  .screen-main { min-width: 0; }

  .kicker {
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-size: 11px;
    font-weight: 600;
    color: var(--teal-600);
    margin-bottom: 14px;
  }
  .screen-title {
    font-family: var(--font-serif);
    font-weight: 500;
    font-size: 40px;
    line-height: 1.12;
    letter-spacing: -0.018em;
    color: var(--ink);
    margin: 0 0 18px;
    text-wrap: pretty;
  }
  .screen-deck {
    font-family: var(--font-serif);
    font-size: 19px;
    line-height: 1.5;
    color: var(--slate-700);
    margin: 0 0 32px;
    max-width: 64ch;
    font-weight: 400;
  }

  /* ---------- Dr. Maya panel ---------- */
  .maya-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .maya-avatar-wrap {
    width: 170px;
    height: 200px;
    overflow: hidden;
    border-radius: 50%;
    background: linear-gradient(180deg, var(--slate-100), var(--paper));
    display: grid; place-items: end center;
    margin: 0 auto;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--slate-200);
  }
  .maya-avatar-wrap svg {
    transform: translateY(8px);
  }
  .maya-bubble {
    position: relative;
    background: var(--paper);
    border: 1px solid var(--slate-200);
    border-radius: var(--radius-lg);
    padding: 18px 18px 18px;
    box-shadow: var(--shadow-sm);
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--slate-700);
  }
  .maya-bubble-tail {
    position: absolute;
    top: -8px;
    left: 32px;
    width: 14px; height: 14px;
    background: var(--paper);
    border-left: 1px solid var(--slate-200);
    border-top: 1px solid var(--slate-200);
    transform: rotate(45deg);
  }
  .maya-bubble-name {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--teal-600);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .maya-bubble-body p { margin: 0 0 10px; }
  .maya-bubble-body p:last-child { margin-bottom: 0; }
  .maya-sign {
    font-family: var(--font-serif);
    font-style: italic;
    color: var(--ink);
    margin-top: 14px !important;
  }

  /* ---------- Patient quote (screen 1) ---------- */
  .patient-quote {
    position: relative;
    background: var(--paper);
    border: 1px solid var(--slate-200);
    border-radius: var(--radius-lg);
    padding: 36px 40px 32px 64px;
    margin: 0 0 36px;
    box-shadow: var(--shadow-md);
  }
  .patient-quote-mark {
    position: absolute;
    top: 12px; left: 24px;
    font-family: var(--font-serif);
    font-size: 96px;
    line-height: 1;
    color: var(--teal-500);
    font-weight: 700;
  }
  .patient-quote blockquote {
    font-family: var(--font-serif);
    font-size: 22px;
    line-height: 1.5;
    color: var(--ink);
    margin: 0 0 18px;
    font-weight: 400;
    text-wrap: pretty;
  }
  .patient-quote blockquote em {
    font-style: italic;
    background: var(--warn-bg);
    padding: 0 4px;
    border-radius: 3px;
  }
  .patient-quote figcaption {
    display: flex;
    align-items: baseline;
    gap: 12px;
    border-top: 1px dashed var(--slate-200);
    padding-top: 14px;
  }
  .patient-quote-name {
    font-weight: 600;
    color: var(--ink);
    font-size: 14px;
  }
  .patient-quote-sub {
    color: var(--slate-500);
    font-size: 13px;
  }

  /* ---------- Prompt + option list ---------- */
  .prompt { margin-top: 16px; }
  .prompt-label {
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--teal-600);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .prompt-q {
    font-family: var(--font-serif);
    font-size: 26px;
    line-height: 1.25;
    color: var(--ink);
    margin: 0 0 20px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .option-list {
    display: grid;
    gap: 12px;
    margin-bottom: 24px;
  }
  .option {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    gap: 14px;
    align-items: start;
    text-align: left;
    background: var(--paper);
    border: 1.5px solid var(--slate-200);
    border-radius: var(--radius-md);
    padding: 16px 18px;
    font-family: inherit;
    font-size: 15.5px;
    line-height: 1.5;
    color: var(--ink-soft);
    transition: all 180ms ease;
  }
  .option:not(:disabled):hover {
    border-color: var(--teal-300);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .option-letter {
    font-family: var(--font-serif);
    font-weight: 600;
    color: var(--teal-600);
    font-size: 18px;
    background: var(--teal-50);
    width: 32px; height: 32px;
    border-radius: 50%;
    display: grid; place-items: center;
    line-height: 1;
  }
  .option-text { padding-top: 4px; }
  .option-tag {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    color: var(--good);
    background: var(--good-bg);
    padding: 5px 9px;
    border-radius: 999px;
    align-self: center;
    white-space: nowrap;
  }
  .option-tag--no {
    color: var(--bad);
    background: var(--bad-bg);
  }
  .option--correct {
    border-color: var(--good);
    background: linear-gradient(0deg, var(--good-bg), var(--paper));
  }
  .option--correct .option-letter {
    background: var(--good);
    color: var(--paper);
  }
  .option--incorrect {
    border-color: var(--bad);
  }
  .option--incorrect .option-letter {
    background: var(--bad-bg);
    color: var(--bad);
  }
  .option--dim {
    opacity: 0.55;
  }
  .option:disabled { cursor: default; }

  /* ---------- Feedback block ---------- */
  .feedback {
    background: var(--paper);
    border: 1px solid var(--slate-200);
    border-left: 4px solid var(--teal-500);
    border-radius: var(--radius-md);
    padding: 22px 24px;
    box-shadow: var(--shadow-sm);
    animation: fade-rise 380ms cubic-bezier(.16, 1, .3, 1) both;
  }
  .feedback--good { border-left-color: var(--good); }
  .feedback--reflect { border-left-color: var(--warn); }
  .feedback-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
  }
  .feedback-header > svg {
    border-radius: 50%;
    background: var(--slate-100);
    flex-shrink: 0;
  }
  .feedback-name {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--teal-600);
    font-weight: 600;
  }
  .feedback-label {
    font-family: var(--font-serif);
    font-weight: 600;
    font-size: 18px;
    color: var(--ink);
  }
  .feedback p { margin: 0 0 10px; color: var(--ink-soft); font-size: 15.5px; line-height: 1.6; }
  .feedback p:last-child { margin-bottom: 0; }
  .feedback-bridge {
    margin-top: 14px !important;
    padding-top: 14px;
    border-top: 1px dashed var(--slate-200);
    font-size: 14.5px !important;
    color: var(--slate-700) !important;
    font-style: italic;
  }
  @keyframes fade-rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Principles (screen 2) ---------- */
  .principle-grid {
    display: grid;
    gap: 14px;
    margin-bottom: 32px;
  }
  .principle-card {
    background: var(--paper);
    border: 1.5px solid var(--slate-200);
    border-radius: var(--radius-md);
    overflow: hidden;
    transition: all 250ms ease;
  }
  .principle-card.is-open {
    border-color: var(--teal-300);
    box-shadow: var(--shadow-md);
  }
  .principle-head {
    width: 100%;
    display: grid;
    grid-template-columns: 56px 1fr 24px;
    align-items: center;
    gap: 16px;
    background: transparent;
    border: none;
    padding: 18px 22px;
    text-align: left;
  }
  .principle-num {
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 500;
    color: var(--teal-500);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .principle-card.is-open .principle-num {
    color: var(--teal-700);
  }
  .principle-title {
    font-family: var(--font-serif);
    font-size: 21px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .principle-chev {
    transition: transform 200ms ease;
    color: var(--slate-500);
  }
  .principle-card.is-open .principle-chev { transform: rotate(180deg); color: var(--teal-600); }
  .principle-hint {
    font-size: 14.5px;
    color: var(--slate-500);
    padding: 0 22px 18px 78px;
    line-height: 1.5;
    margin-top: -10px;
  }
  .principle-body {
    padding: 4px 22px 24px 78px;
    animation: fade-rise 320ms cubic-bezier(.16, 1, .3, 1) both;
  }
  .principle-body p {
    font-size: 15.5px;
    line-height: 1.6;
    color: var(--ink-soft);
    margin: 0 0 18px;
  }
  .principle-body p em {
    color: var(--teal-700);
    font-style: italic;
  }
  .example-block {
    display: grid;
    gap: 10px;
    margin-top: 14px;
  }
  .example-row {
    display: grid;
    grid-template-columns: 92px 1fr;
    gap: 16px;
    align-items: start;
    background: var(--slate-50);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
  }
  .example-row--bad {
    background: var(--bad-bg);
  }
  .example-row--good {
    background: var(--good-bg);
  }
  .example-tag {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
    color: var(--slate-500);
    padding-top: 3px;
  }
  .example-row--bad .example-tag { color: var(--bad); }
  .example-row--good .example-tag { color: var(--good); }
  .example-text {
    font-family: var(--font-serif);
    font-size: 15.5px;
    line-height: 1.5;
    color: var(--ink);
    font-style: italic;
  }

  .progress-pips {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--slate-500);
    font-size: 13px;
  }
  .pip {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 1.5px solid var(--slate-300);
    background: transparent;
    transition: all 200ms ease;
  }
  .pip--filled {
    background: var(--teal-500);
    border-color: var(--teal-500);
  }
  .progress-pips-label {
    margin-left: 6px;
    letter-spacing: 0.02em;
  }

  /* ---------- Scenario (screen 3) ---------- */
  .patient-card {
    display: grid;
    grid-template-columns: 60px 1fr;
    gap: 16px;
    align-items: center;
    background: var(--paper);
    border: 1px solid var(--slate-200);
    border-radius: var(--radius-md);
    padding: 16px 20px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 24px;
  }
  .patient-card-avatar svg { display: block; border-radius: 50%; }
  .patient-card-name {
    font-family: var(--font-serif);
    font-weight: 600;
    font-size: 18px;
    color: var(--ink);
  }
  .patient-card-meta {
    font-size: 13px;
    color: var(--slate-500);
    margin-top: 2px;
  }
  .patient-card-labs {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .lab-pill {
    display: inline-flex;
    align-items: baseline;
    gap: 6px;
    background: var(--slate-50);
    border: 1px solid var(--slate-200);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12.5px;
  }
  .lab-pill-k {
    font-weight: 600;
    color: var(--slate-500);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 10.5px;
  }
  .lab-pill-v {
    color: var(--ink);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .lab-pill-d {
    color: var(--warn);
    font-size: 11.5px;
    font-style: italic;
  }
  .scene {
    background: var(--slate-50);
    border-radius: var(--radius-md);
    padding: 18px 22px;
    margin-bottom: 20px;
  }
  .scene-stage {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 16.5px;
    line-height: 1.55;
    color: var(--slate-700);
  }
  .dialogue {
    display: grid;
    gap: 14px;
    margin-bottom: 24px;
  }
  .dialogue-narration {
    font-family: var(--font-serif);
    font-style: italic;
    color: var(--slate-500);
    font-size: 14.5px;
    padding: 4px 8px;
    border-left: 2px solid var(--slate-200);
  }
  .dialogue-line {
    display: grid;
    grid-template-columns: 64px 1fr;
    gap: 14px;
    align-items: start;
    animation: fade-rise 380ms cubic-bezier(.16, 1, .3, 1) both;
  }
  .dialogue-tag {
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--slate-500);
    padding-top: 14px;
    text-align: right;
  }
  .dialogue-line--elena .dialogue-tag {
    color: var(--ink);
  }
  .dialogue-body {
    font-family: var(--font-serif);
    font-size: 17.5px;
    line-height: 1.5;
    background: var(--paper);
    border: 1px solid var(--slate-200);
    border-radius: 16px;
    padding: 14px 18px;
    color: var(--ink);
    box-shadow: var(--shadow-sm);
  }
  .dialogue-line--elena .dialogue-body {
    background: var(--slate-50);
    border-radius: 4px 16px 16px 16px;
  }
  .dialogue-line--you .dialogue-body {
    background: var(--paper);
    border-radius: 16px 4px 16px 16px;
  }
  .dialogue-line.choice-good .dialogue-body {
    border-color: var(--good);
    background: linear-gradient(0deg, var(--good-bg), var(--paper));
  }
  .dialogue-line.choice-less-good .dialogue-body {
    border-color: var(--warn);
    background: linear-gradient(0deg, var(--warn-bg), var(--paper));
  }
  .dialogue-line.mood-anxious .dialogue-body { border-color: var(--bad); }
  .dialogue-line.mood-relieved .dialogue-body { border-color: var(--good); }

  .reaction-note {
    background: var(--warn-bg);
    border: 1px solid #f4d3a8;
    border-radius: var(--radius-md);
    padding: 14px 18px;
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--slate-700);
    animation: fade-rise 380ms cubic-bezier(.16, 1, .3, 1) both;
    margin-left: 78px;
  }
  .reaction-note strong { color: var(--ink); font-weight: 600; }
  .reaction-note em { color: var(--ink); font-weight: 600; font-style: italic; }
  .reaction-note--good {
    background: var(--good-bg);
    border-color: #b8ddd1;
  }
  .time-marker {
    display: flex;
    align-items: center;
    gap: 16px;
    color: var(--slate-500);
    font-size: 12.5px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin: 18px 0 4px;
    font-weight: 600;
  }
  .time-marker::before, .time-marker::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--slate-200);
  }
  .decision-block {
    background: var(--paper);
    border: 2px dashed var(--teal-300);
    border-radius: var(--radius-md);
    padding: 18px 20px;
    animation: fade-rise 380ms cubic-bezier(.16, 1, .3, 1) both;
  }
  .decision-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--teal-600);
    font-weight: 700;
    margin-bottom: 14px;
  }
  .decision-options {
    display: grid;
    gap: 10px;
  }
  .decision-option {
    display: grid;
    grid-template-columns: 36px 1fr;
    gap: 14px;
    align-items: start;
    text-align: left;
    background: var(--paper);
    border: 1.5px solid var(--slate-200);
    border-radius: var(--radius-md);
    padding: 14px 18px;
    font-family: var(--font-serif);
    font-size: 16px;
    line-height: 1.5;
    color: var(--ink);
    transition: all 180ms ease;
  }
  .decision-option:hover {
    border-color: var(--teal-500);
    background: var(--teal-50);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .decision-letter {
    font-family: var(--font-serif);
    font-weight: 600;
    color: var(--teal-600);
    font-size: 18px;
    background: var(--teal-50);
    width: 32px; height: 32px;
    border-radius: 50%;
    display: grid; place-items: center;
    line-height: 1;
  }
  .scenario-step .btn-primary { margin-top: 12px; }

  /* ---------- Knowledge check (screen 4) ---------- */
  .quiz-q {
    background: var(--paper);
    border: 1px solid var(--slate-200);
    border-radius: var(--radius-lg);
    padding: 28px 32px;
    margin-bottom: 24px;
    box-shadow: var(--shadow-sm);
  }
  .quiz-q-num {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--slate-500);
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .quiz-q-kind {
    color: var(--teal-600);
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--teal-50);
    font-size: 10.5px;
  }
  .quiz-stem {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.3;
    margin: 0 0 22px;
    letter-spacing: -0.01em;
  }
  .quiz-options {
    display: grid;
    gap: 10px;
    margin-bottom: 16px;
  }
  .quiz-option {
    display: grid;
    grid-template-columns: 30px 1fr;
    gap: 14px;
    text-align: left;
    background: var(--paper);
    border: 1.5px solid var(--slate-200);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.5;
    color: var(--ink-soft);
    transition: all 180ms ease;
  }
  .quiz-option:not(:disabled):hover {
    border-color: var(--teal-500);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .quiz-letter {
    font-weight: 700;
    color: var(--teal-600);
    font-size: 14px;
    background: var(--teal-50);
    width: 24px; height: 24px;
    border-radius: 50%;
    display: grid; place-items: center;
    margin-top: 1px;
  }
  .quiz-option--correct {
    border-color: var(--good);
    background: var(--good-bg);
  }
  .quiz-option--correct .quiz-letter {
    background: var(--good); color: var(--paper);
  }
  .quiz-option--incorrect {
    border-color: var(--bad);
  }
  .quiz-option--incorrect .quiz-letter {
    background: var(--bad-bg); color: var(--bad);
  }
  .quiz-option--dim { opacity: 0.55; }
  .quiz-option:disabled { cursor: default; }
  .quiz-rationale {
    border-radius: var(--radius-md);
    padding: 16px 18px;
    margin-top: 8px;
    border: 1px solid var(--slate-200);
    background: var(--slate-50);
    animation: fade-rise 360ms cubic-bezier(.16, 1, .3, 1) both;
  }
  .quiz-rationale--good {
    border-color: #b8ddd1;
    background: var(--good-bg);
  }
  .quiz-rationale--no {
    border-color: #f4d3a8;
    background: var(--warn-bg);
  }
  .quiz-rationale-head {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 700;
    color: var(--good);
    margin-bottom: 6px;
  }
  .quiz-rationale--no .quiz-rationale-head { color: var(--warn); }
  .quiz-rationale p { margin: 0 0 8px; font-size: 14.5px; line-height: 1.55; color: var(--slate-700); }
  .quiz-rationale p:last-child { margin-bottom: 0; }
  .quiz-rationale-correct {
    padding-top: 8px;
    border-top: 1px dashed rgba(0,0,0,0.08);
    color: var(--ink) !important;
  }

  /* score card */
  .score-card {
    background: var(--ink);
    color: var(--paper);
    border-radius: var(--radius-lg);
    padding: 30px 34px;
    margin-top: 8px;
    animation: fade-rise 420ms cubic-bezier(.16, 1, .3, 1) both;
  }
  .score-card-bar {
    height: 6px;
    background: rgba(255,255,255,0.12);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 22px;
  }
  .score-card-fill {
    height: 100%;
    background: var(--teal-300);
    border-radius: 999px;
    transition: width 800ms cubic-bezier(.16, 1, .3, 1);
  }
  .score-card-row {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 32px;
    align-items: center;
  }
  .score-card-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--teal-300);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .score-card-num {
    font-family: var(--font-serif);
    font-size: 64px;
    font-weight: 500;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .score-card-num span {
    font-size: 28px;
    color: var(--slate-400);
  }
  .score-card-msg {
    font-family: var(--font-serif);
    font-size: 18px;
    line-height: 1.5;
    color: var(--slate-300);
    max-width: 50ch;
  }
  .score-card-actions {
    margin-top: 22px;
    display: flex;
    gap: 12px;
  }

  /* ---------- Buttons ---------- */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--ink);
    color: var(--paper);
    border: 1px solid var(--ink);
    border-radius: 999px;
    padding: 13px 22px 13px 24px;
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: 0.01em;
    transition: all 200ms ease;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .btn-primary:not(:disabled):hover {
    background: var(--teal-700);
    border-color: var(--teal-700);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .btn-primary--big {
    padding: 16px 28px 16px 30px;
    font-size: 15.5px;
  }
  .btn-primary--disabled, .btn-primary:disabled {
    background: var(--slate-200);
    color: var(--slate-500);
    border-color: var(--slate-200);
    cursor: not-allowed;
    box-shadow: none;
  }
  .btn-arrow {
    transition: transform 200ms ease;
    font-size: 17px;
    line-height: 1;
  }
  .btn-primary:not(:disabled):hover .btn-arrow { transform: translateX(3px); }
  .btn-ghost {
    background: transparent;
    color: var(--paper);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 999px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 500;
    transition: all 180ms ease;
  }
  .btn-ghost:hover {
    border-color: var(--teal-300);
    color: var(--teal-300);
  }

  /* ---------- Screen footer / nav ---------- */
  .screen-footer {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 18px;
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--slate-200);
  }
  .screen-hint {
    font-size: 13px;
    color: var(--slate-500);
    font-style: italic;
  }
  .nav-rail {
    background: var(--paper);
    border-top: 1px solid var(--slate-200);
    padding: 14px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.03);
  }
  .nav-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: 1px solid var(--slate-200);
    border-radius: 999px;
    padding: 8px 16px;
    color: var(--slate-700);
    font-size: 13.5px;
    font-weight: 500;
    transition: all 180ms ease;
  }
  .nav-btn:not(:disabled):hover {
    border-color: var(--ink);
    color: var(--ink);
    transform: translateY(-1px);
  }
  .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .nav-meta {
    font-family: var(--font-serif);
    font-size: 15px;
    color: var(--slate-500);
    letter-spacing: 0.06em;
    font-variant-numeric: tabular-nums;
  }
  .nav-meta-num { color: var(--ink); font-weight: 600; }
  .nav-meta-divider { margin: 0 6px; }

  /* ---------- Title card ---------- */
  .title-card {
    max-width: 1280px;
    margin: 0 auto;
    padding: 56px 56px 32px;
  }
  .title-card-grid {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 64px;
    align-items: center;
  }
  .title-card-h {
    font-family: var(--font-serif);
    font-weight: 500;
    font-size: 56px;
    line-height: 1.04;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin: 4px 0 22px;
    text-wrap: balance;
  }
  .title-card-deck {
    font-family: var(--font-serif);
    font-size: 20px;
    line-height: 1.5;
    color: var(--slate-700);
    margin: 0 0 32px;
    max-width: 58ch;
  }
  .title-card-meta {
    border-top: 1px solid var(--slate-200);
    border-bottom: 1px solid var(--slate-200);
    padding: 20px 0;
    margin-bottom: 28px;
    display: grid;
    gap: 14px;
  }
  .meta-row {
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 24px;
    align-items: baseline;
  }
  .meta-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--slate-500);
    font-weight: 600;
  }
  .meta-val {
    font-size: 14.5px;
    color: var(--ink-soft);
    line-height: 1.55;
  }
  .title-card-modules {
    margin-top: 32px;
    display: grid;
    gap: 1px;
    background: var(--slate-200);
    border: 1px solid var(--slate-200);
    border-radius: var(--radius-md);
    overflow: hidden;
  }
  .module-row {
    display: grid;
    grid-template-columns: 50px 1fr auto;
    gap: 16px;
    padding: 14px 18px;
    background: var(--paper);
    align-items: center;
    font-size: 14.5px;
  }
  .module-num {
    font-family: var(--font-serif);
    color: var(--teal-600);
    font-weight: 600;
    font-size: 17px;
  }
  .module-title { color: var(--ink); font-weight: 500; }
  .module-dur { color: var(--slate-500); font-size: 12.5px; font-variant-numeric: tabular-nums; }

  .title-card-art {
    position: relative;
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .title-maya-wrap {
    width: 320px; height: 360px;
    border-radius: 50% / 56%;
    background: radial-gradient(ellipse at center, var(--teal-50), var(--bone) 70%);
    display: grid;
    place-items: end center;
    overflow: hidden;
    border: 1px solid var(--slate-200);
    position: relative;
    box-shadow: var(--shadow-md);
  }
  .title-maya-wrap svg { transform: translateY(12px); }
  .title-bubble {
    position: absolute;
    bottom: 20px;
    right: -14px;
    max-width: 290px;
    background: var(--paper);
    border: 1px solid var(--slate-200);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    box-shadow: var(--shadow-lg);
    font-size: 14px;
    line-height: 1.5;
    color: var(--slate-700);
  }
  .title-bubble::before {
    content: '';
    position: absolute;
    left: -8px;
    bottom: 24px;
    width: 14px; height: 14px;
    background: var(--paper);
    border-left: 1px solid var(--slate-200);
    border-bottom: 1px solid var(--slate-200);
    transform: rotate(45deg);
  }
  .title-bubble-name {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--teal-600);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .title-bubble p { margin: 0; }

  /* ---------- Responsive ---------- */
  @media (max-width: 1024px) {
    .screen-grid { grid-template-columns: 260px 1fr; gap: 36px; }
    .title-card-grid { grid-template-columns: 1fr; gap: 32px; }
    .title-card-h { font-size: 44px; }
    .screen-title { font-size: 32px; }
    .reaction-note { margin-left: 0; }
    .principle-hint, .principle-body { padding-left: 22px; }
  }
  @media (max-width: 720px) {
    .topbar { padding: 12px 18px 0; }
    .brand-title { font-size: 13.5px; }
    .topbar-meta { display: none; }
    .screen { padding: 28px 22px 18px; }
    .title-card { padding: 36px 22px 18px; }
    .screen-grid { grid-template-columns: 1fr; gap: 28px; }
    .screen-side { position: static; }
    .maya-avatar-wrap { width: 140px; height: 160px; }
    .nav-rail { padding: 12px 18px; }
  }
</style>
</head>
